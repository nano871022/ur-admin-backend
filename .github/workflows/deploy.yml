name: Deploy to Firebase Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Selecciona el proyecto/entorno a desplegar'
        required: true
        default: 'production-tss'
        type: choice
        options:
          - production-tss
          - production-alm181

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production-tss' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Service Account
        run: |
          echo '${{ secrets.FIREBASE_TOKEN }}' > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: |
          PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          if [ -n "$PROJECT_ID" ]; then
            firebase deploy --only functions --project "$PROJECT_ID" --non-interactive --force
          else
            firebase deploy --only functions --non-interactive --force
          fi

      - name: Cleanup Service Account File
        if: always()
        run: rm -f service-account.json

      - name: Create and push tag
        run: |
          VERSION="v1.0.${{ github.run_number }}-${{ github.event.inputs.environment || 'prod' }}"
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git tag $VERSION
          git push origin $VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
