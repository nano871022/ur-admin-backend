name: Deploy to Firebase Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Selecciona el proyecto/entorno a desplegar'
        required: true
        default: 'production-tss'
        type: choice
        options:
          - production-tss
          - production-alm181

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production-tss' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          if [ -n "$PROJECT_ID" ]; then
            firebase deploy --only functions --project "$PROJECT_ID" --non-interactive --token "$FIREBASE_TOKEN"
          else
            firebase deploy --only functions --non-interactive --token "$FIREBASE_TOKEN"
          fi

      - name: Create and push tag
        run: |
          VERSION="v1.0.${{ github.run_number }}-${{ github.event.inputs.environment || 'prod' }}"
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git tag $VERSION
          git push origin $VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
