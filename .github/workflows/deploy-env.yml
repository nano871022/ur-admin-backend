name: Deploy Task

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      FIREBASE_TOKEN:
        required: true
      APP_SECRET:
        required: true
      PROPERTIES_REPO_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
        
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Service Account
        run: |
          echo '${{ secrets.FIREBASE_TOKEN }}' > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json" >> $GITHUB_ENV

      - name: Checkout properties repo
        uses: actions/checkout@v4
        with:
          repository: nano871022/japl-properties
          token: ${{ secrets.PROPERTIES_REPO_TOKEN }}
          path: japl-properties
       #   sparse-checkout: |
       #     ${{ vars.PATH_ENV }}
       #   sparse-checkout-cone-mode: false

      - name: Setup environment file
        run: |
          ENV_PATH=$(echo "${{ vars.PATH_ENV }}" | sed 's|^\./||')
          mv "japl-properties/$ENV_PATH" .env
          rm -rf japl-properties

      - name: Deploy to Firebase
        run: |
          PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          firebase deploy --only functions --project "$PROJECT_ID" --non-interactive --force

      - name: Cleanup Service Account File
        if: always()
        run: rm -f service-account.json
